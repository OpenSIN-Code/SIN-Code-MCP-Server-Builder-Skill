name: CEO Audit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run tests
        run: pytest -q
      - name: Lint
        run: |
          black --check src/ tests/
          ruff check src/ tests/
      - name: Type check
        run: mypy src/
      - name: CoDocs check
        run: |
          python3 -c "
          import os, sys
          missing = []
          for root, dirs, files in os.walk('src'):
              for f in files:
                  if f.endswith('.py') and not f.startswith('__'):
                      doc = f[:-3] + '.doc.md'
                      if doc not in files:
                          missing.append(os.path.join(root, f))
          for root, dirs, files in os.walk('tests'):
              for f in files:
                  if f.endswith('.py') and not f.startswith('__'):
                      doc = f[:-3] + '.doc.md'
                      if doc not in files:
                          missing.append(os.path.join(root, f))
          if missing:
              print('MISSING CoDocs:', file=sys.stderr)
              for m in missing: print(' -', m, file=sys.stderr)
              sys.exit(1)
          print('CoDocs: 100%')
          "
      - name: CEO Audit
        run: |
          pip install sin-code-bundle[ceo-audit]
          sin ceo-audit run . --profile=QUICK --grade=B
        env:
          SIN_GITHUB_FALLBACK_TOKEN: ${{ secrets.SIN_GITHUB_FALLBACK_TOKEN }}
