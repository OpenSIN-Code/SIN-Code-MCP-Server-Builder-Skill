name: CEO Audit

on:
  push:
    branches: [main]

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - run: go mod tidy
      - run: go test ./...
      - name: CEO Audit
        run: |
          pip install sin-code-bundle[ceo-audit]
          sin ceo-audit run . --profile=QUICK --grade=B
        env:
          SIN_GITHUB_FALLBACK_TOKEN: ${{ secrets.SIN_GITHUB_FALLBACK_TOKEN }}
